<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#12122a"/>
  <rect x="60" y="60" width="680" height="380" rx="12" fill="#1e1e3a"/>
  <!-- circuit grid -->
  <line x1="100" y1="100" x2="700" y2="100" stroke="#2d2d5a" stroke-width="1"/>
  <line x1="100" y1="160" x2="700" y2="160" stroke="#2d2d5a" stroke-width="1"/>
  <line x1="100" y1="220" x2="700" y2="220" stroke="#2d2d5a" stroke-width="1"/>
  <line x1="100" y1="280" x2="700" y2="280" stroke="#2d2d5a" stroke-width="1"/>
  <line x1="100" y1="340" x2="700" y2="340" stroke="#2d2d5a" stroke-width="1"/>
  <line x1="100" y1="400" x2="700" y2="400" stroke="#2d2d5a" stroke-width="1"/>
  <!-- chip shape -->
  <rect x="310" y="185" width="180" height="130" rx="6" fill="#6366f1" opacity="0.3"/>
  <rect x="320" y="195" width="160" height="110" rx="4" fill="#6366f1" opacity="0.5"/>
  <!-- pins left -->
  <rect x="280" y="205" width="40" height="8" rx="2" fill="#818cf8"/>
  <rect x="280" y="225" width="40" height="8" rx="2" fill="#818cf8"/>
  <rect x="280" y="245" width="40" height="8" rx="2" fill="#818cf8"/>
  <rect x="280" y="265" width="40" height="8" rx="2" fill="#818cf8"/>
  <rect x="280" y="285" width="40" height="8" rx="2" fill="#818cf8"/>
  <!-- pins right -->
  <rect x="480" y="205" width="40" height="8" rx="2" fill="#818cf8"/>
  <rect x="480" y="225" width="40" height="8" rx="2" fill="#818cf8"/>
  <rect x="480" y="245" width="40" height="8" rx="2" fill="#818cf8"/>
  <rect x="480" y="265" width="40" height="8" rx="2" fill="#818cf8"/>
  <rect x="480" y="285" width="40" height="8" rx="2" fill="#818cf8"/>
  <!-- label -->
  <text x="400" y="255" text-anchor="middle" dominant-baseline="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#e2e2e6">ESP32</text>
  <!-- temperature display -->
  <text x="400" y="430" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="#6ee7b7">28.4 °C</text>
  <text x="400" y="82" text-anchor="middle" font-family="monospace" font-size="13" fill="#8888a0">CONTROL DE TEMPERATURA</text>
</svg>
