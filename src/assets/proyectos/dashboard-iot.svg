<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#12122a"/>
  <!-- browser chrome -->
  <rect x="60" y="60" width="680" height="380" rx="12" fill="#1a1a24" stroke="#2d2d3a" stroke-width="1.5"/>
  <rect x="60" y="60" width="680" height="36" rx="12" fill="#22223a"/>
  <rect x="60" y="84" width="680" height="12" fill="#22223a"/>
  <circle cx="92" cy="78" r="6" fill="#ef4444" opacity="0.7"/>
  <circle cx="114" cy="78" r="6" fill="#f59e0b" opacity="0.7"/>
  <circle cx="136" cy="78" r="6" fill="#22c55e" opacity="0.7"/>
  <!-- url bar -->
  <rect x="200" y="68" width="350" height="20" rx="4" fill="#2d2d3a"/>
  <text x="375" y="82" text-anchor="middle" dominant-baseline="middle" font-family="monospace" font-size="10" fill="#8888a0">localhost:3000/dashboard</text>
  <!-- cards row -->
  <rect x="90" y="120" width="140" height="70" rx="6" fill="#22223a" stroke="#2d2d3a" stroke-width="1"/>
  <text x="160" y="148" text-anchor="middle" font-family="monospace" font-size="10" fill="#8888a0">TEMPERATURA</text>
  <text x="160" y="170" text-anchor="middle" font-family="monospace" font-size="22" font-weight="bold" fill="#6ee7b7">28.4°</text>
  <rect x="250" y="120" width="140" height="70" rx="6" fill="#22223a" stroke="#2d2d3a" stroke-width="1"/>
  <text x="320" y="148" text-anchor="middle" font-family="monospace" font-size="10" fill="#8888a0">HUMEDAD</text>
  <text x="320" y="170" text-anchor="middle" font-family="monospace" font-size="22" font-weight="bold" fill="#60a5fa">62%</text>
  <rect x="410" y="120" width="140" height="70" rx="6" fill="#22223a" stroke="#2d2d3a" stroke-width="1"/>
  <text x="480" y="148" text-anchor="middle" font-family="monospace" font-size="10" fill="#8888a0">PRESIÓN</text>
  <text x="480" y="170" text-anchor="middle" font-family="monospace" font-size="22" font-weight="bold" fill="#c084fc">1013</text>
  <rect x="570" y="120" width="140" height="70" rx="6" fill="#22223a" stroke="#2d2d3a" stroke-width="1"/>
  <text x="640" y="148" text-anchor="middle" font-family="monospace" font-size="10" fill="#8888a0">UPTIME</text>
  <text x="640" y="170" text-anchor="middle" font-family="monospace" font-size="22" font-weight="bold" fill="#fb923c">99.8%</text>
  <!-- chart -->
  <rect x="90" y="210" width="460" height="200" rx="6" fill="#22223a" stroke="#2d2d3a" stroke-width="1"/>
  <polyline points="110,380 155,350 200,360 245,320 290,330 335,290 380,300 425,270 470,280 515,250" stroke="#6366f1" stroke-width="2" fill="none" stroke-linejoin="round"/>
  <polyline points="110,390 155,385 200,380 245,370 290,375 335,365 380,360 425,355 470,345 515,340" stroke="#6ee7b7" stroke-width="2" fill="none" stroke-linejoin="round"/>
  <text x="280" y="228" text-anchor="middle" font-family="monospace" font-size="10" fill="#8888a0">HISTÓRICO — ÚLTIMAS 24 H</text>
  <!-- sidebar -->
  <rect x="570" y="210" width="140" height="200" rx="6" fill="#22223a" stroke="#2d2d3a" stroke-width="1"/>
  <text x="640" y="235" text-anchor="middle" font-family="monospace" font-size="10" fill="#8888a0">DISPOSITIVOS</text>
  <circle cx="595" cy="265" r="5" fill="#22c55e"/>
  <text x="610" y="269" font-family="monospace" font-size="10" fill="#e2e2e6">sensor-01</text>
  <circle cx="595" cy="290" r="5" fill="#22c55e"/>
  <text x="610" y="294" font-family="monospace" font-size="10" fill="#e2e2e6">sensor-02</text>
  <circle cx="595" cy="315" r="5" fill="#f59e0b"/>
  <text x="610" y="319" font-family="monospace" font-size="10" fill="#e2e2e6">gateway</text>
</svg>
