<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#12122a"/>
  <rect x="60" y="60" width="680" height="380" rx="12" fill="#1e1e3a"/>
  <!-- enclosure -->
  <rect x="150" y="130" width="500" height="260" rx="10" fill="#22223a" stroke="#3d3d5a" stroke-width="2"/>
  <!-- display -->
  <rect x="180" y="160" width="200" height="90" rx="6" fill="#0d1117" stroke="#6366f1" stroke-width="1.5"/>
  <text x="280" y="200" text-anchor="middle" font-family="monospace" font-size="30" font-weight="bold" fill="#6ee7b7">12.0V</text>
  <text x="280" y="232" text-anchor="middle" font-family="monospace" font-size="14" fill="#8888a0">0.85 A</text>
  <!-- knob -->
  <circle cx="470" cy="205" r="45" fill="#2d2d4a" stroke="#818cf8" stroke-width="2"/>
  <circle cx="470" cy="205" r="36" fill="#22223a"/>
  <line x1="470" y1="170" x2="470" y2="185" stroke="#818cf8" stroke-width="3" stroke-linecap="round"/>
  <!-- terminals -->
  <circle cx="230" cy="340" r="20" fill="#ef4444" stroke="#fca5a5" stroke-width="2"/>
  <text x="230" y="345" text-anchor="middle" dominant-baseline="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#fff">+</text>
  <circle cx="290" cy="340" r="20" fill="#1e1e2a" stroke="#6b7280" stroke-width="2"/>
  <text x="290" y="345" text-anchor="middle" dominant-baseline="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#9ca3af">−</text>
  <!-- label -->
  <text x="400" y="82" text-anchor="middle" font-family="monospace" font-size="13" fill="#8888a0">FUENTE DE ALIMENTACIÓN REGULABLE</text>
  <text x="500" y="350" text-anchor="middle" font-family="monospace" font-size="11" fill="#8888a0">1.25V – 30V  /  3A</text>
</svg>
